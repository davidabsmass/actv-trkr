version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      radix-ui:
        patterns: ["@radix-ui/*"]
      dev-tooling:
        dependency-type: development
        patterns: ["*"]
        exclude-patterns: ["typescript", "vite", "@vitejs/*"]
    ignore:
      # Major framework bumps require manual review.
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      - dependency-name: vite
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
