name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  # ─── Layer 1: Source quality ────────────────────────────────────────────
  app-quality:
    name: App quality (lint + tsc + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps (resilient to lockfile drift)
        run: |
          set +e
          npm ci --no-audit --no-fund
          if [ $? -ne 0 ]; then
            echo "::warning::npm ci failed (lockfile drift) — falling back to npm install"
            npm install --no-audit --no-fund
          fi
      # Lint is advisory: warnings allowed, even errors only annotated (Phase 1).
      - name: ESLint (advisory)
        run: |
          set +e
          npm run lint
          code=$?
          if [ $code -ne 0 ]; then
            echo "::warning::ESLint reported issues (exit $code) — non-blocking in Phase 1."
          fi
          exit 0
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Vitest
        run: npm test

  # ─── Layer 2: Static security ──────────────────────────────────────────
  semgrep:
    name: Semgrep (TS/React)
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v5
      - name: Semgrep scan (SARIF only, non-blocking on findings)
        run: |
          set +e
          semgrep scan \
            --config p/typescript \
            --config p/react \
            --config p/owasp-top-ten \
            --config .semgrep/ \
            --sarif --output semgrep.sarif \
            --no-error
          [ -f semgrep.sarif ] || echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif
          exit 0
      # Upload is best-effort: if Code Scanning isn't enabled on the repo, don't fail the job.
      - name: Upload SARIF (best-effort)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
      - name: Note if Code Scanning disabled
        if: always()
        run: echo "::notice::If SARIF upload failed, enable Code Scanning under repo Settings → Code security to surface findings."

  # ─── Layer 3: PHP/WP standards (advisory) ──────────────────────────────
  php:
    name: PHP (PHPCS + PHPStan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mission-metrics-wp-plugin
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, cs2pr
          coverage: none
          ini-values: memory_limit=2G
      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHP parse check
        run: composer run lint:php
      - name: PHPCS (changed files only on PRs, advisory)
        if: github.event_name == 'pull_request'
        run: |
          set +e
          composer run phpcs:diff
          [ $? -ne 0 ] && echo "::warning::PHPCS findings on changed files — advisory."
          exit 0
      - name: PHPCS (full, advisory)
        if: github.event_name != 'pull_request'
        run: |
          set +e
          composer run phpcs
          [ $? -ne 0 ] && echo "::warning::PHPCS findings — advisory."
          exit 0
      - name: PHPStan (advisory)
        run: |
          set +e
          vendor/bin/phpstan analyse --memory-limit=2G
          [ $? -ne 0 ] && echo "::warning::PHPStan findings — advisory."
          exit 0

  # ─── Layer 4: Dependency CVEs ──────────────────────────────────────────
  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps (resilient to lockfile drift)
        run: |
          set +e
          npm ci --no-audit --no-fund
          if [ $? -ne 0 ]; then
            echo "::warning::npm ci failed (lockfile drift) — falling back to npm install"
            npm install --no-audit --no-fund
          fi
      # audit-ci is advisory; the PR-only dependency-review-action below is the actual gate.
      - name: audit-ci (advisory)
        run: |
          set +e
          npx audit-ci --config audit-ci.json
          code=$?
          if [ $code -ne 0 ]; then
            echo "::warning::audit-ci flagged advisories (exit $code) — non-blocking; see logs."
          fi
          exit 0
      - name: GitHub Dependency Review (PR gate)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─── Layer 5: Secret leakage ───────────────────────────────────────────
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─── Layer 6: Frontend product (Lighthouse) ────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - run: npm run build
      - name: Lighthouse CI (advisory)
        run: |
          set +e
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=lighthouserc.json
          code=$?
          if [ $code -ne 0 ]; then
            echo "::warning::Lighthouse regressions detected (exit $code) — advisory."
          fi
          exit 0

  # ─── Aggregator: single PR comment ─────────────────────────────────────
  quality-summary:
    name: Quality summary
    runs-on: ubuntu-latest
    needs: [app-quality, semgrep, php, deps, gitleaks]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const layers = {
              'Source quality': '${{ needs.app-quality.result }}',
              'Static security (Semgrep)': '${{ needs.semgrep.result }}',
              'PHP / WordPress': '${{ needs.php.result }}',
              'Dependency CVEs': '${{ needs.deps.result }}',
              'Secret leakage': '${{ needs.gitleaks.result }}',
            };
            const icon = r => r === 'success' ? '✅' : r === 'failure' ? '❌' : r === 'skipped' ? '⏭️' : '⚠️';
            const body = [
              '### Quality pipeline summary',
              '',
              '| Layer | Result |',
              '|---|---|',
              ...Object.entries(layers).map(([k, v]) => `| ${k} | ${icon(v)} ${v} |`),
              '',
              '_Lint, PHPCS/PHPStan, audit-ci, and Lighthouse are advisory (Phase 1)._',
              '_Hard gates: TypeScript, Vitest, gitleaks, dependency-review (high+ CVEs on PRs)._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Quality pipeline summary'));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
