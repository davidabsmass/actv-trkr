name: Nightly drift scan

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  deps:
    name: Re-audit shipped deps
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - id: audit
        run: |
          set +e
          npx audit-ci --config audit-ci.json --report-type full > audit.txt 2>&1
          echo "exit=$?" >> $GITHUB_OUTPUT
          cat audit.txt
      - name: Open issue if regression
        if: steps.audit.outputs.exit != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = '```\n' + fs.readFileSync('audit.txt', 'utf8').slice(0, 60000) + '\n```';
            await github.rest.issues.create({
              ...context.repo,
              title: `[nightly] new dependency vulnerability detected (${new Date().toISOString().slice(0,10)})`,
              body,
              labels: ['quality:nightly', 'severity:high'],
            });

  gitleaks-history:
    name: gitleaks (full history)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Honor repo allowlist (e.g., UUIDs in supabase/migrations/*.sql that
          # the generic-api-key heuristic mis-flags). Without this var the action
          # ignores .gitleaks.toml and surfaces benign matches.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  zap-baseline:
    name: ZAP baseline (staging)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://mshnctrl.lovable.app'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -m 5 -T 10'
          fail_action: false # nightly is reporting only
          allow_issue_writing: true
