# gitleaks configuration for ACTV TRKR
# Extends the default rule pack and adds project-specific allowlist entries.

[extend]
useDefault = true

[allowlist]
description = "Files and patterns that are intentionally safe to expose."

paths = [
  '''node_modules/.*''',
  '''public/downloads/.*''',
  '''dist/.*''',
  '''.*\.lock$''',
  '''bun\.lockb$''',
  '''package-lock\.json$''',
  # Test fixtures and snapshots may contain placeholder secrets.
  '''.*__fixtures__.*''',
  '''.*\.test\.tsx?$''',
  '''.*\.spec\.tsx?$''',
  # Generated Supabase types — never contain real secrets, but include "key" strings.
  '''src/integrations/supabase/types\.ts$''',
  # SQL migrations contain UUIDs (user IDs, row IDs) that trip generic-api-key
  # heuristics. Migrations are reviewed at write time and never contain secrets
  # (they're checked into version control by design).
  '''supabase/migrations/.*\.sql$''',
]

regexes = [
  # Supabase publishable / anon key (safe to expose by design — JWT prefix `eyJhbGciOi`)
  '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.eyJpc3MiOiJzdXBhYmFzZSI[A-Za-z0-9_\-\.]+''',
  # Public Supabase URL of this project
  '''https://qnnxlvoybbmmqoxuqyvf\.supabase\.co''',
  # Lovable project ID — public identifier, not a credential
  '''0015e01c-8e1e-425b-884e-18051bf17654''',
]

stopwords = [
  "EXAMPLE",
  "PLACEHOLDER",
  "YOUR_KEY_HERE",
  "TODO",
]
